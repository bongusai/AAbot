<!DOCTYPE html>
<html>
<head>

<title>AA Chatbot</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#ece5dd;
font-family:sans-serif;
}

.container-box{
max-width:900px;
margin:auto;
margin-top:40px;
}

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:15px;
margin-top:20px;
}

.video-grid iframe{
width:100%;
height:200px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container-box text-center">

<h3>Play songs</h3>

<hr>

<h5>Telugu Songs</h5>

<div class="video-grid" id="songs"></div>

<!-- <input id="code" class="form-control mt-3" placeholder="Enter song name"> -->
<input id="code" class="form-control mt-3" placeholder="Enter song Name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
<button onclick="join()" class="btn btn-success mt-3 w-100">Search</button>

<div id="error" class="text-danger mt-2"></div>
<hr>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>
<script src="js/firebase.js"></script>

<script>

function join(){

let code=document.getElementById("code").value.trim();

if(!code){
document.getElementById("error").innerText="Enter room code";
return;
}

let now=new Date();

let hh=now.getHours().toString().padStart(2,'0');
let mm=now.getMinutes().toString().padStart(2,'0');

let adminPass=hh+mm;

// ADMIN LOGIN
if(code===adminPass){

window.location="admin.html";
return;

}

// CHECK ROOM EXISTS

db.ref("rooms/"+code).once("value",snap=>{

if(snap.exists()){

localStorage.setItem("user","user"+Math.floor(Math.random()*1000));

window.location="chat.html?room="+code;

}else{

document.getElementById("error").innerText="Invalid search";

}

});

}


// YOUTUBE VIDEOS

const videos=[

"jeRAribjMqU",
"2a34XyiZO14",
"iAtoZar5W58",
"S3L7Nl7Byzg",
"u_wB6byrl5k",
"V5c4BnmPTpU",
"_trhJirf5lM",
"dXO5p6QRG7A",
"9MjeQfa3Wyg"

];

let html="";

videos.forEach(v=>{

html+=`
<iframe
src="https://www.youtube.com/embed/${v}"
allowfullscreen>
</iframe>
`;

});

document.getElementById("songs").innerHTML=html;

</script>

</body>
</html>
