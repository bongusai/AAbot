<!DOCTYPE html>
<html>
<head>

<title>AA Chatbot</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#ece5dd;
font-family:sans-serif;
}

.container-box{
max-width:500px;
margin:auto;
margin-top:40px;
}

.song-box iframe{
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container-box text-center">

<h3>Join Chat Room</h3>

<input id="code" class="form-control mt-3" placeholder="Enter Room Code">

<button onclick="join()" class="btn btn-success mt-3 w-100">Open Chat</button>

<div id="error" class="text-danger mt-2"></div>

<hr>

<h5>Telugu Songs</h5>

<div class="song-box" id="songs"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>
<script src="js/firebase.js"></script>

<script>

function join(){

let code=document.getElementById("code").value.trim();

if(!code){
document.getElementById("error").innerText="Enter room code";
return;
}

let now=new Date();

let hh=now.getHours().toString().padStart(2,'0');
let mm=now.getMinutes().toString().padStart(2,'0');

let adminPass=hh+mm;

// ADMIN LOGIN
if(code===adminPass){

window.location="admin.html";
return;

}

// CHECK ROOM EXISTS

db.ref("rooms/"+code).once("value",snap=>{

if(snap.exists()){

localStorage.setItem("user","user"+Math.floor(Math.random()*1000));

window.location="chat.html?room="+code;

}else{

document.getElementById("error").innerText="Invalid room code";

}

});

}

// RANDOM TELUGU SONG

const videos=[
"7kJYv1g6f88",
"kJQP7kiw5Fk",
"JGwWNGJdvx8",
"RgKAFK5djSk"
];

let r=Math.floor(Math.random()*videos.length);

document.getElementById("songs").innerHTML=
`<iframe width="100%" height="220"
src="https://www.youtube.com/embed/${videos[r]}"
allowfullscreen></iframe>`;

</script>

</body>
</html>
